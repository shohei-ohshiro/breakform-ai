<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="#111827"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  <g opacity="0.15" fill="none" stroke="#f59e0b" stroke-dasharray="4 4" stroke-width="1">
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
  </g>
  <g fill="#f59e0b" opacity="0.35" font-family="monospace" font-size="14" text-anchor="middle">
    <text x="300" y="40">FIXTURE BACKDROP</text>
    <text x="300" y="580" font-size="11" opacity="0.7">synthetic landmarks — no real image</text>
  </g>
</svg>
